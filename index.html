<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Open Instagram</title>
<script>
  (function () {
    var scheme = "instagram://create/post?enable_posting=true";
    var fallback = "https://www.instagram.com/create/";
    // Try app scheme first by briefly loading it
    document.addEventListener("DOMContentLoaded", function () {
      var iframe = document.createElement("iframe");
      iframe.style.display = "none";
      iframe.src = scheme;
      document.body.appendChild(iframe);
      setTimeout(function () {
        window.location.replace(fallback);
      }, 1200);
    });
  })();
</script>
<style>
  body { font-family: system-ui, sans-serif; background:#000; color:#fff; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
  .box { text-align:center; padding: 24px; }
  a { color:#eaeaea; }
</style>
</head>
<body>
<div class="box">
  <p>Membuka Instagram...</p>
  <p><a href="https://www.instagram.com/create/">Buka manual</a></p>
</div>
</body>
</html>
